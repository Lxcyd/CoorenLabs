name: Automated Build and Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Tag Action
        id: tag_action
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          # The action automatically looks for #major, #minor, #patch in commit messages
          # If none are found, it uses DEFAULT_BUMP

      - name: Create GitHub Release
        if: steps.tag_action.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_action.outputs.new_tag }}
          name: Release ${{ steps.tag_action.outputs.new_tag }}
          body: |
            Automated release for version ${{ steps.tag_action.outputs.new_tag }}
            
            Changes in this version:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
